services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: supagloo
      POSTGRES_PASSWORD: supagloo
      # Pin to the built-in `postgres` maintenance db so the image does NOT
      # auto-create a db named after POSTGRES_USER. That makes the init script
      # below the single source of truth for BOTH logical databases, and lets
      # its `CREATE DATABASE supagloo;` be unconditional (no "already exists").
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # First-run init: creates `supagloo` (app) + `supagloo_dbos` (DBOS system).
      - ./infra/pg-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supagloo"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: supagloo
      MINIO_ROOT_PASSWORD: supagloo-dev
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console

  # One-shot: wait for MinIO to accept connections, then create the dev bucket.
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until mc alias set local http://minio:9000 supagloo supagloo-dev; do
          echo 'minio-init: waiting for minio...'
          sleep 1
        done
        mc mb --ignore-existing local/supagloo-dev
        echo 'minio-init: bucket supagloo-dev ready'

  # One-shot: apply database-lib's Prisma migrations to the `supagloo` app db,
  # then exit. `prisma migrate deploy` reads the schema + migrations shipped
  # inside @supagloo/database-lib via the api image's prisma.config.ts. The `api`
  # service waits for this to complete successfully before starting.
  # NOTE: build context is the api submodule (production form). A local,
  # gitignored docker-compose.override.yml redirects it to ../supagloo-nodejs-api
  # to build in-flight code before the submodule pointer is bumped.
  migrate:
    build:
      context: ./supagloo-nodejs-api
      dockerfile: Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgres://supagloo:supagloo@postgres:5432/supagloo
    depends_on:
      postgres:
        condition: service_healthy

  # Fastify API. Public, unversioned GET /healthz -> 200 {"status":"ok"}.
  api:
    build:
      context: ./supagloo-nodejs-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://supagloo:supagloo@postgres:5432/supagloo
      # Task #18 (design-delta §5.1): the DBOS SYSTEM db the API enqueues git-ops jobs
      # to via DBOSClient (the same system db the `dbos:` worker consumes). Distinct
      # from DATABASE_URL (the app db). The API never runs the DBOS runtime.
      DBOS_DATABASE_URL: postgres://supagloo:supagloo@postgres:5432/supagloo_dbos
      PORT: "4000"
      HOST: 0.0.0.0
      NODE_ENV: production
      # Required (fail-fast at boot) — shared by api + dbos, must match exactly.
      # Well-known dev-only value (same one in supagloo-database-lib/.env.example);
      # never use this in prod.
      SECRETS_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: supagloo-dev
      S3_ACCESS_KEY: supagloo
      S3_SECRET_KEY: supagloo-dev
      S3_REGION: us-east-1
      # Task #11 GitHub App (design-delta §2.3). Required (fail-fast at boot) —
      # one pair per app registration, shared by api + dbos, NOT hardcoded here
      # since GITHUB_APP_PRIVATE_KEY/GITHUB_APP_CLIENT_SECRET are real secrets.
      # Sourced from a root .env (gitignored; see .env.example) via Compose's
      # built-in ${VAR} substitution. GITHUB_APP_CLIENT_ID/SECRET are api-only
      # (Task #26 create-new-repo JIT user-auth hop — dbos has no user context).
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET}
    ports:
      - "4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  # DBOS worker. Statically-registered durable workflows + queues (git-ops,
  # ai-generation, render). No public HTTP surface (no `ports:`) — work arrives
  # via DBOSClient enqueue against the system db. Two databases: DATABASE_URL is
  # the app db (`supagloo`, where workflows write domain rows); DBOS_DATABASE_URL
  # is the DBOS system db (`supagloo_dbos`, checkpoints/queues — DBOS creates its
  # own tables there on launch). dbos has NO migrate service of its own; it waits
  # for the API's one-shot `migrate` so the app schema exists before workers run.
  # NOTE: build context is the dbos submodule (production form). The gitignored
  # docker-compose.override.yml redirects it to ../supagloo-nodejs-dbos to build
  # in-flight code before the submodule pointer is bumped.
  dbos:
    build:
      context: ./supagloo-nodejs-dbos
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://supagloo:supagloo@postgres:5432/supagloo
      DBOS_DATABASE_URL: postgres://supagloo:supagloo@postgres:5432/supagloo_dbos
      NODE_ENV: production
      # Required (fail-fast at boot) — MUST match the api service's value exactly, or
      # decryptSecret fails with AUTH_FAILED when a generation workflow loads a
      # provider credential. Same well-known dev-only value as db-lib's .env.example.
      SECRETS_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      # Task #32: the S3 (writer) vars the asset-uploading workflows use — same names as the
      # api service. dbos uploads against the internal endpoint (minio:9000); S3_PUBLIC_ENDPOINT
      # is unused by dbos (it never presigns) but kept for name-parity with the api block.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: supagloo-dev
      S3_ACCESS_KEY: supagloo
      S3_SECRET_KEY: supagloo-dev
      S3_REGION: us-east-1
      # Task #17 GitHub App (design-delta §2.3/§7). Required (fail-fast at boot) —
      # git-ops workflows sign App JWTs to mint installation tokens. Same real
      # app registration as the api service's pair; sourced from the root .env
      # (gitignored; see .env.example). dbos has no user context, so it does NOT
      # need GITHUB_APP_SLUG/CLIENT_ID/CLIENT_SECRET (api-only, Task #26).
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully

  nextjs:
    build:
      context: ./supagloo-nextjs
      dockerfile: Dockerfile
    ports:
      - "8000:3000"

volumes:
  pgdata: {}
  minio-data: {}
